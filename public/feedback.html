<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Share Feedback — FindSomethingToDo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet" crossorigin="anonymous">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAFAF7;--card:#FFF;--text:#1D1B18;--t2:#706B64;--t3:#B0A99F;
  --border:#EBE7E2;--accent:#D4593A;--warm:#F3EDE6;--r:12px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.page-header{max-width:720px;margin:0 auto;padding:32px 24px 0;text-align:center}
.page-header h1{font-family:'Fraunces',serif;font-size:1.5rem;margin-bottom:4px}
.page-header h1 a{color:var(--text);text-decoration:none}
.page-header h1 a span{color:var(--accent)}
.page-header p{color:var(--t2);font-size:.88rem;margin-top:8px}
.form-wrap{max-width:720px;margin:24px auto;padding:0 24px 80px;flex:1}
.form-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:28px 24px}
label{display:block;font-size:.82rem;font-weight:600;color:var(--text);margin-bottom:6px}
input,textarea,select{
  width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;
  font-size:.88rem;font-family:inherit;background:#fff;color:var(--text);outline:none;
  margin-bottom:16px;
}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:120px}
.hint{font-size:.72rem;color:var(--t3);margin:-12px 0 16px}
.submit-btn{
  display:inline-block;padding:12px 28px;background:var(--accent);color:#fff;
  border:none;border-radius:20px;font-size:.92rem;font-weight:600;
  font-family:inherit;cursor:pointer;width:100%;
}
.submit-btn:hover{background:#C04E31}
.success{display:none;text-align:center;padding:40px 24px}
.success h2{font-family:'Fraunces',serif;margin-bottom:8px}
.success p{color:var(--t2);font-size:.88rem}
.success a{color:var(--accent);font-weight:600;text-decoration:none}
.back-link{display:block;text-align:center;margin-top:16px;font-size:.85rem;color:var(--accent);text-decoration:none;font-weight:500}
.back-link:hover{text-decoration:underline}
.site-footer{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--card);border-top:1px solid var(--border);
  padding:6px 16px;display:flex;align-items:center;justify-content:center;gap:6px;
  font-size:.72rem;
}
.site-footer a{color:var(--t3);text-decoration:none;font-weight:500}
.site-footer a:hover{text-decoration:underline;color:var(--accent)}
.footer-sep{color:var(--t3);margin:0 4px}
</style>
</head>
<body>

<div class="page-header">
  <h1><a href="/"><span>Find</span>SomethingToDo</a></h1>
  <p>Help us make this better. All feedback is welcome.</p>
</div>

<div class="form-wrap">
  <div class="form-card" id="formCard">
    <label for="feedbackType">What's this about?</label>
    <select id="feedbackType">
      <option value="general">General feedback</option>
      <option value="bug">Something is wrong or inaccurate</option>
      <option value="missing">A place or event is missing</option>
      <option value="idea">Feature idea</option>
    </select>

    <label for="feedbackMsg">Your feedback</label>
    <textarea id="feedbackMsg" placeholder="Tell us what's on your mind..."></textarea>

    <label for="feedbackEmail">Email (optional)</label>
    <input type="email" id="feedbackEmail" placeholder="In case we have follow-up questions">
    <p class="hint">We'll never share your email. See our <a href="/terms.html" style="color:var(--accent)">privacy policy</a>.</p>

    <button class="submit-btn" id="submitBtn">Send Feedback</button>
  </div>

  <div class="success" id="successMsg">
    <h2>Thank you!</h2>
    <p>We read every submission and it helps us improve.<br><br><a href="/">Back to activities</a></p>
  </div>

  <a href="/" class="back-link">&larr; Back to activities</a>
</div>

<footer class="site-footer">
  <a href="/feedback.html">Share Feedback</a>
  <span class="footer-sep">&middot;</span>
  <a href="/add-event.html">Add your Event</a>
  <span class="footer-sep">&middot;</span>
  <a href="/terms.html">Terms &amp; Privacy</a>
</footer>

<script>
function sanitize(s) { return s.replace(/[\r\n]/g, ' '); }
function submitFeedback() {
  const type = sanitize(document.getElementById('feedbackType').value);
  const msg = sanitize(document.getElementById('feedbackMsg').value.trim());
  const email = sanitize(document.getElementById('feedbackEmail').value.trim());

  if (!msg) { alert('Please enter your feedback.'); return; }

  const subject = encodeURIComponent('FindSomethingToDo Feedback: ' + type);
  const body = encodeURIComponent(
    'Type: ' + type + '\n\n' +
    msg + '\n\n' +
    (email ? 'Reply to: ' + email : '(no email provided)')
  );

  if (window.posthog) posthog.capture('feedback_submit', { type: type });

  window.location.href = 'mailto:thedebbyexperiment@gmail.com?subject=' + subject + '&body=' + body;

  document.getElementById('formCard').style.display = 'none';
  document.getElementById('successMsg').style.display = 'block';
}
document.getElementById('submitBtn').addEventListener('click', submitFeedback);

</body>
</html>
