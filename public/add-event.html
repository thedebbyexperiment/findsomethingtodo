<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Add your Event — FindSomethingToDo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet" crossorigin="anonymous">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAFAF7;--card:#FFF;--text:#1D1B18;--t2:#706B64;--t3:#B0A99F;
  --border:#EBE7E2;--accent:#D4593A;--warm:#F3EDE6;--r:12px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.page-header{max-width:720px;margin:0 auto;padding:32px 24px 0;text-align:center}
.page-header h1{font-family:'Fraunces',serif;font-size:1.5rem;margin-bottom:4px}
.page-header h1 a{color:var(--text);text-decoration:none}
.page-header h1 a span{color:var(--accent)}
.page-header p{color:var(--t2);font-size:.88rem;margin-top:8px}
.form-wrap{max-width:720px;margin:24px auto;padding:0 24px 80px;flex:1}
.form-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:28px 24px}
label{display:block;font-size:.82rem;font-weight:600;color:var(--text);margin-bottom:6px}
input,textarea,select{
  width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;
  font-size:.88rem;font-family:inherit;background:#fff;color:var(--text);outline:none;
  margin-bottom:16px;
}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:100px}
.hint{font-size:.72rem;color:var(--t3);margin:-12px 0 16px}
.submit-btn{
  display:inline-block;padding:12px 28px;background:var(--accent);color:#fff;
  border:none;border-radius:20px;font-size:.92rem;font-weight:600;
  font-family:inherit;cursor:pointer;width:100%;
}
.submit-btn:hover{background:#C04E31}
.type-toggle{display:flex;gap:8px;margin-bottom:20px}
.type-toggle button{
  flex:1;padding:10px 16px;border:1.5px solid var(--border);border-radius:8px;
  font-size:.85rem;font-family:inherit;background:#fff;color:var(--t2);
  cursor:pointer;font-weight:500;transition:all .15s;
}
.type-toggle button.active{border-color:var(--accent);color:var(--accent);background:var(--warm)}
.section-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);font-weight:600;margin-bottom:12px}
.company-fields{display:none}
.row{display:flex;gap:12px}
.row > *{flex:1}
.success{display:none;text-align:center;padding:40px 24px}
.success h2{font-family:'Fraunces',serif;margin-bottom:8px}
.success p{color:var(--t2);font-size:.88rem}
.success a{color:var(--accent);font-weight:600;text-decoration:none}
.back-link{display:block;text-align:center;margin-top:16px;font-size:.85rem;color:var(--accent);text-decoration:none;font-weight:500}
.back-link:hover{text-decoration:underline}
.consent{display:flex;align-items:flex-start;gap:8px;margin-bottom:16px;font-size:.78rem;color:var(--t2)}
.consent input{width:auto;margin:2px 0 0}
.site-footer{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--card);border-top:1px solid var(--border);
  padding:6px 16px;display:flex;align-items:center;justify-content:center;gap:6px;
  font-size:.72rem;
}
.site-footer a{color:var(--t3);text-decoration:none;font-weight:500}
.site-footer a:hover{text-decoration:underline;color:var(--accent)}
.footer-sep{color:var(--t3);margin:0 4px}
</style>
</head>
<body>

<div class="page-header">
  <h1><a href="/"><span>Find</span>SomethingToDo</a></h1>
  <p>Get your activity in front of NYC families.</p>
</div>

<div class="form-wrap">
  <div class="form-card" id="formCard">

    <p class="section-label">I am a...</p>
    <div class="type-toggle">
      <button id="btnParent" class="active">Parent / Community</button>
      <button id="btnCompany">Company / Venue</button>
    </div>

    <div class="company-fields" id="companyFields">
      <label for="companyName">Company / venue name</label>
      <input type="text" id="companyName" placeholder="e.g. Brooklyn Boulders">

      <label for="companyWebsite">Website</label>
      <input type="url" id="companyWebsite" placeholder="https://...">
    </div>

    <label for="eventName">Event or activity name</label>
    <input type="text" id="eventName" placeholder="e.g. Family Open Climb, Bluey Live Experience">

    <label for="eventDesc">What is it?</label>
    <textarea id="eventDesc" placeholder="Briefly describe the activity and why families would enjoy it."></textarea>

    <div class="row">
      <div>
        <label for="eventAddr">Address or neighborhood</label>
        <input type="text" id="eventAddr" placeholder="e.g. 110 5th Ave, NYC">
      </div>
      <div>
        <label for="eventAges">Ages</label>
        <input type="text" id="eventAges" placeholder="e.g. 2-8">
      </div>
    </div>

    <div class="row">
      <div>
        <label for="eventDate">Date(s)</label>
        <input type="text" id="eventDate" placeholder="e.g. Ongoing, or Apr 20-25">
      </div>
      <div>
        <label for="eventPrice">Price</label>
        <input type="text" id="eventPrice" placeholder="e.g. Free, $15/kid">
      </div>
    </div>

    <label for="eventContact">Your email <span id="emailReq" style="display:none;color:var(--accent);font-weight:400">(required)</span><span id="emailOpt" style="color:var(--t3);font-weight:400">(optional)</span></label>
    <input type="email" id="eventContact" placeholder="So we can follow up if needed">

    <div class="consent">
      <input type="checkbox" id="consentBox">
      <label for="consentBox" style="margin-bottom:0;font-weight:400;font-size:.78rem">I agree to the <a href="/terms.html" style="color:var(--accent)">Terms of Use &amp; Privacy Policy</a> and confirm this is a family-friendly activity.</label>
    </div>

    <button class="submit-btn" id="submitBtn">Submit Event</button>
  </div>

  <div class="success" id="successMsg">
    <h2>Submitted!</h2>
    <p>We'll review your event and add it if it's a fit. Thanks for contributing.<br><br><a href="/">Back to activities</a></p>
  </div>

  <a href="/" class="back-link">&larr; Back to activities</a>
</div>

<footer class="site-footer">
  <a href="/feedback.html">Share Feedback</a>
  <span class="footer-sep">&middot;</span>
  <a href="/add-event.html">Add your Event</a>
  <span class="footer-sep">&middot;</span>
  <a href="/terms.html">Terms &amp; Privacy</a>
</footer>

<script>
let submitterType = 'parent';

function sanitize(s) { return s.replace(/[\r\n]/g, ' '); }
function setType(type) {
  submitterType = type;
  document.getElementById('btnParent').classList.toggle('active', type === 'parent');
  document.getElementById('btnCompany').classList.toggle('active', type === 'company');
  document.getElementById('companyFields').style.display = type === 'company' ? 'block' : 'none';
  document.getElementById('emailReq').style.display = type === 'company' ? 'inline' : 'none';
  document.getElementById('emailOpt').style.display = type === 'company' ? 'none' : 'inline';
}

function submitEvent() {
  const name = sanitize(document.getElementById('eventName').value.trim());
  const desc = sanitize(document.getElementById('eventDesc').value.trim());
  const addr = sanitize(document.getElementById('eventAddr').value.trim());
  const contact = sanitize(document.getElementById('eventContact').value.trim());
  const consent = document.getElementById('consentBox').checked;

  if (!name) { alert('Please enter the event name.'); return; }
  if (!desc) { alert('Please describe the activity.'); return; }
  if (submitterType === 'company' && !contact) { alert('Please enter your email so we can follow up.'); return; }
  if (!consent) { alert('Please agree to the Terms of Use & Privacy Policy.'); return; }

  const companyName = sanitize(document.getElementById('companyName').value.trim());
  const companyWeb = sanitize(document.getElementById('companyWebsite').value.trim());
  const ages = sanitize(document.getElementById('eventAges').value.trim());
  const date = sanitize(document.getElementById('eventDate').value.trim());
  const price = sanitize(document.getElementById('eventPrice').value.trim());

  const typeLabel = submitterType === 'company' ? 'COMPANY/VENUE' : 'PARENT/COMMUNITY';
  const subject = encodeURIComponent('FindSomethingToDo Event Submission (' + typeLabel + ')');

  let body = 'Submitted by: ' + typeLabel + '\n';
  if (submitterType === 'company') {
    body += 'Company: ' + (companyName || '-') + '\n';
    body += 'Website: ' + (companyWeb || '-') + '\n';
  }
  body += '\nEvent: ' + name + '\n';
  body += 'Description: ' + desc + '\n';
  body += 'Address: ' + (addr || '-') + '\n';
  body += 'Ages: ' + (ages || '-') + '\n';
  body += 'Date(s): ' + (date || '-') + '\n';
  body += 'Price: ' + (price || '-') + '\n';
  body += '\nContact: ' + (contact || '(not provided)');

  if (window.posthog) posthog.capture('event_submit', { type: submitterType });

  window.location.href = 'mailto:thedebbyexperiment@gmail.com?subject=' + subject + '&body=' + encodeURIComponent(body);

  document.getElementById('formCard').style.display = 'none';
  document.getElementById('successMsg').style.display = 'block';
}
document.getElementById('btnParent').addEventListener('click', function() { setType('parent'); });
document.getElementById('btnCompany').addEventListener('click', function() { setType('company'); });
document.getElementById('submitBtn').addEventListener('click', submitEvent);

// PostHog

  person_profiles: 'identified_only',
  capture_pageview: true,
  capture_pageleave: true,
  autocapture: false

posthog.register({ site: 'findsomethingtodo' });

</script>
</body>
</html>
